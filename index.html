<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Questions</title>
    <link rel="stylesheet" href=./graphics.css>
</head>
<body>
    <h1>20 Questions</h1>
    <h2>Currently Playing With: <strong>mrMac802</strong></h2>
    <div id="questionContainer">
        <div id="questionsA" class="question">
            <h3>Player 1 Questions</h3><hr>
        </div>
        <div id="questionsB" class="question">
            <h3>Player 2 Questions</h3><hr>
        </div>
    </div>

    <div class="inputContainer">
        <h3>Player 1 Ask a Question:</h3>
        <input id="questionA" class="inputA" type="text">
        <div class="buttonContainer">
            <button class="inputA yes respond">Yes</button>
            <button class="inputA no respond">No</button>
            <button class="inputA correct respond">Correct!</button>
        </div>
    </div>

    <div class="inputContainer">
        <h3>Player 2 Ask a Question:</h3>
        <input id="questionB" class="inputB" type="text">
        <div class="buttonContainer">
            <button class="inputB yes respond">Yes</button>
            <button class="inputB no respond">No</button>
            <button class="inputB correct respond">Correct!</button>
        </div>
    </div>
</body>
<script src="./gameLogic.js"></script>
</html>
